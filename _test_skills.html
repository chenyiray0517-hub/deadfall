<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head><body><pre id="out">running...</pre>
<script type="module">
const out = [];
const test = (name, cond, extra = '') => out.push(`${cond ? 'PASS' : 'FAIL'} ${name} ${extra}`);
try {
  const { Skills, SKILL_DEFS, XP } = await import('./src/player/Skills.js');
  const { Stats } = await import('./src/player/Stats.js');
  const { Inventory } = await import('./src/player/Items.js');
  const C = await import('./src/systems/Crafting.js');
  const B = await import('./src/systems/Building.js');

  // ── 升級曲線 ──
  let sk = new Skills();
  test('初始 Lv1 無點數', sk.level === 1 && sk.points === 0 && sk.xp === 0);
  test('xpNeed 曲線 60/90/120', sk.xpNeed() === 60 && (sk.level = 2, sk.xpNeed() === 90) && (sk.level = 3, sk.xpNeed() === 120));
  sk = new Skills();
  let ups = sk.addXp(59);
  test('未達門檻不升級', ups === 0 && sk.level === 1 && sk.xp === 59);
  ups = sk.addXp(1);
  test('滿 60 XP 升 Lv2 +1 點', ups === 1 && sk.level === 2 && sk.points === 1 && sk.xp === 0);
  ups = sk.addXp(150); // 90 升 Lv3,剩 60
  test('溢出 XP 進位', ups === 1 && sk.level === 3 && sk.points === 2 && sk.xp === 60);

  // ── 加點 ──
  test('canUp 有點才行', sk.canUp('fitness') === true);
  let msg = sk.up('fitness');
  test('加點成功回傳訊息', !!msg && sk.levelOf('fitness') === 1 && sk.points === 1, msg);
  sk.up('fitness');
  test('滿級擋下', sk.canUp('fitness') === false && sk.up('fitness') === null && sk.levelOf('fitness') === 2);
  test('沒點數擋下', sk.points === 0 && sk.up('melee') === null);
  test('desc 全部可呼叫', SKILL_DEFS.every((d) => typeof d.desc(1) === 'string' && typeof d.desc(d.max) === 'string'));

  // ── 效果數值 ──
  test('強健體魄 +30 體力上限', sk.staminaBonus() === 30);
  const full = new Skills();
  full.points = 99;
  for (const d of SKILL_DEFS) for (let i = 0; i < d.max; i++) full.up(d.id);
  test('全滿等總點數 = 15', 99 - full.points === 15);
  test('輕足 -50% 噪音', full.noiseMult() === 0.5);
  test('採集達人 70% 加成', Math.abs(full.bonusLootChance() - 0.7) < 1e-9);
  test('近戰 +40% 遠程 +30%', Math.abs(full.meleeMult() - 1.4) < 1e-9 && Math.abs(full.rangedMult() - 1.3) < 1e-9);
  test('神射手 Lv2 箭回收 90%', full.arrowRecover() === 0.9 && new Skills().arrowRecover() === 0.6);
  test('強韌血統感染機率 x0.36', Math.abs(full.biteMult() - 0.36) < 1e-9);

  // ── Stats 掛鉤 ──
  const st = new Stats();
  st.skills = full;
  test('體力上限 100 → 130', st.staminaMax === 130);
  st.hunger = 0;
  test('飢餓歸零仍減半(65)', st.staminaMax === 65);
  st.hunger = 100;
  const origRandom = Math.random;
  Math.random = () => 0.2; // 0.2 > 0.3*0.36=0.108 → 有強韌不感染;無技能會感染
  st.applyBite(5, '測試');
  test('強韌血統擋下咬傷感染', st.infection === 0);
  const st2 = new Stats();
  st2.applyBite(5, '測試');
  test('無技能同樣骰值會感染', st2.infection > 0);
  Math.random = origRandom;

  // ── 急救專精:繃帶 +25 ──
  const inv = new Inventory();
  inv.add('bandage', 2);
  st.hp = 50;
  msg = inv.use('bandage', st);
  test('急救專精繃帶 +25', st.hp === 75, msg);
  st2.hp = 50;
  inv.use('bandage', st2);
  test('無技能繃帶 +15', st2.hp === 65);

  // ── 巧手工匠:材料 -20% ──
  const bow = C.RECIPES.find((r) => r.id === 'bow'); // wood3 + cloth1
  const dc = C.costOf(bow, full);
  test('工匠折扣 wood3→2、下限 1', dc.wood === 2 && dc.cloth === 1);
  test('無技能原價', C.costOf(bow, null).wood === 3 && C.costOf(bow).wood === 3);
  const inv2 = new Inventory();
  inv2.add('wood', 2); inv2.add('cloth', 1);
  test('折扣後 canCraft', C.canCraft(bow, inv2, false, full) === true && C.canCraft(bow, inv2, false, null) === false);
  msg = C.craft(bow, inv2, { nearFire: false, skills: full });
  test('craft 扣折扣後材料', !!msg && inv2.count('wood') === 0 && inv2.count('bow') === 1, msg);

  // ── 烤肉配方(補上的營火烹飪)──
  const cook = C.RECIPES.find((r) => r.id === 'cook');
  const inv3 = new Inventory();
  inv3.add('rawmeat', 1);
  test('烤肉需要營火', !!cook && C.canCraft(cook, inv3, false) === false && C.canCraft(cook, inv3, true) === true);
  msg = C.craft(cook, inv3, { nearFire: true });
  test('生肉烤成烤肉', !!msg && inv3.count('cooked') === 1 && inv3.count('rawmeat') === 0, msg);

  // ── 建造折扣與建築師 ──
  const bed = B.BUILDABLES.find((d) => d.id === 'bed'); // wood5 + cloth3
  const bld = new B.Buildings({ add() {}, remove() {} });
  bld.skills = full;
  const inv4 = new Inventory();
  inv4.add('wood', 4); inv4.add('cloth', 2);
  test('建造折扣 canAfford(wood5→4, cloth3→2)', bld.canAfford(bed, inv4) === true);
  bld.skills = null;
  test('無技能買不起', bld.canAfford(bed, inv4) === false);
  test('建築師耐久 x1.5', full.buildHpMult() === 1.5 && new Skills().buildHpMult() === 1);

  // ── 存讀檔 ──
  const data = full.serialize();
  const back = new Skills();
  back.loadFrom(JSON.parse(JSON.stringify(data)));
  test('serialize/loadFrom 還原', back.level === full.level && back.points === full.points &&
    SKILL_DEFS.every((d) => back.levelOf(d.id) === full.levelOf(d.id)));
  const fresh = new Skills();
  fresh.loadFrom(null);
  test('舊檔無 skills 不爆炸', fresh.level === 1 && fresh.points === 0);

  test('XP 常數齊全', XP.loot > 0 && XP.gather > 0 && XP.craft > 0 && XP.build > 0 && XP.day > 0 && XP.corpse > 0);
  const Z = await import('./src/entities/Zombies.js');
  const em = new Z.EnemyManager({ add() {}, remove() {} });
  test('感染者都有擊殺 XP', em.zombies.length > 0 && em.zombies.every((zb) => zb.def.xp > 0), `n=${em.zombies.length}`);
  out.push('TEST_DONE');
} catch (err) {
  out.push('ERROR: ' + err.message + '\n' + err.stack);
}
document.getElementById('out').textContent =
  out.join('\n') + `\n== ${out.filter((l) => l.startsWith('PASS')).length} PASS / ${out.filter((l) => l.startsWith('FAIL')).length} FAIL ==`;
</script></body></html>
